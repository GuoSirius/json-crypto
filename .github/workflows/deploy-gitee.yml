name: Gitee Pages 部署

on:
  push:
    branches: [main]

# 同一分支的多次推送取消之前未完成的运行
concurrency:
  group: gitee-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== CI: 测试 ====================
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test

  # ==================== 部署: Gitee Pages ====================
  deploy-gitee-pages:
    name: Deploy to Gitee Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Gitee Pages
        run: pnpm run build
        env:
          VITE_BASE: /

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy to Gitee gh-pages
        env:
          # Gitee 仓库地址（需要是 Gitee，不是 GitHub）
          # 格式: git@gitee.com:用户名/仓库名.git
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_BRANCH: gh-pages
        run: |
          # 获取仓库名
          REPO_NAME=${{ github.event.repository.name }}
          
          # 确定 Gitee 仓库地址
          if [ -n "$GITEE_REPO" ]; then
            GITEE_URL="https://$GITEE_REPO"
          else
            # 默认使用 GitHub 仓库名转换为 Gitee
            GITEE_URL="https://gitee.com/${{ secrets.GITEE_USERNAME }}/${REPO_NAME}"
          fi
          
          echo "部署到: $GITEE_URL"
          
          # 添加 Gitee 远程仓库
          git remote add gitee "$GITEE_URL.git" || true
          
          # 强制推送到 Gitee gh-pages 分支
          git checkout --orphan $GITEE_BRANCH
          git rm -rf .
          cp -r dist/* .
          git add .
          git commit -m "deploy: Gitee Pages $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push gitee $GITEE_BRANCH --force

      - name: Show deployment info
        run: |
          echo "========================================"
          echo "  Gitee Pages 部署完成！"
          echo "========================================"
          echo ""
          echo "请在 Gitee 仓库中启用 Pages 服务："
          echo "  1. 进入仓库: https://gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}"
          echo "  2. 点击 '管理' → 'Gitee Pages'"
          echo "  3. 选择分支: gh-pages"
          echo "  4. 点击 '启动'"
          echo ""
          echo "访问地址: https://gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}"
          echo "========================================"
