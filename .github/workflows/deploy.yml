name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的多次推送取消之前未完成的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

jobs:
  # ==================== CI: 测试 ====================
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test

  # ==================== 部署: GitHub Pages ====================
  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: |
          echo "Building with VITE_BASE: /${{ github.event.repository.name }}/"
          pnpm run build
          echo "Build completed, checking dist directory..."
          ls -la dist/
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Fix SPA routing for GitHub Pages
        run: |
          echo "Fixing SPA routing for GitHub Pages..."
          cp dist/index.html dist/404.html
          echo "404.html created for GitHub Pages SPA fallback"
          echo "Build artifacts verified successfully!"
          ls -la dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==================== 部署: Cloudflare Workers (SPA) ====================
  deploy-cloudflare-workers:
    name: Deploy to Cloudflare Workers (SPA)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: |
          pnpm run build
          echo "Build completed!"
          ls -la dist/
        env:
          VITE_BASE: /

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy


