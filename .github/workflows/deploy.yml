name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的多次推送取消之前未完成的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

jobs:
  # ==================== CI: 测试 ====================
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test

  # ==================== 部署: GitHub Pages ====================
  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: |
          echo "Building with VITE_BASE: /${{ github.event.repository.name }}/"
          pnpm run build
          echo "Build completed, checking dist directory..."
          ls -la dist/
          
          # 验证构建产物
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: index.html not found in dist directory!"
            exit 1
          fi
          
          if [ ! -f "dist/404.html" ]; then
            echo "ERROR: 404.html not found in dist directory!"
            exit 1
          fi
          
          echo "Build artifacts verified successfully!"
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==================== 部署: Cloudflare Pages ====================
  deploy-cloudflare-pages:
    name: Deploy to Cloudflare Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Pages
        run: pnpm run build
        env:
          VITE_BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=json-crypto

  # ==================== 部署: Gitee Pages ====================
  deploy-gitee-pages:
    name: Deploy to Gitee Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Gitee Pages
        run: pnpm run build
        env:
          VITE_BASE: /

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to Gitee
        run: |
          # 克隆 Gitee 仓库
          git clone https://${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ secrets.GITEE_REPO }}.git gitee-repo
          
          # 复制构建产物到 Gitee 仓库
          rm -rf gitee-repo/*
          cp -r dist/* gitee-repo/
          
          # 提交并推送到 Gitee
          cd gitee-repo
          git add .
          git commit -m "Deploy to Gitee Pages - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
